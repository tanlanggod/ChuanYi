components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PathId:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        requestId:
          type: string
          example: 4f6a3d1f8b5545bb
        data:
          nullable: true

    ApiResponseBoolean:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: boolean
              example: true

    LoginRequest:
      type: object
      required: [loginType]
      properties:
        loginType:
          type: string
          enum: [GUEST, PHONE]
        phone:
          type: string
        verifyCode:
          type: string
        deviceId:
          type: string

    LoginData:
      type: object
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 7200
        userNo:
          type: string
          example: U202602260001
        isGuest:
          type: boolean

    ApiResponseLoginData:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginData'

    MeData:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        userNo:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
        phone:
          type: string
          nullable: true
        loginType:
          type: string
          enum: [GUEST, PHONE]
        status:
          type: string
          enum: [ENABLED, DISABLED]
        isGuest:
          type: boolean

    ApiResponseMeData:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeData'

    SkuCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        parentId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        categoryType:
          type: string
          enum: [BEAD, SPACER, SHAPE, CHARM, PENDANT]
        sortNo:
          type: integer
        status:
          type: string
          enum: [ENABLED, DISABLED]

    ApiResponseSkuCategoryList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/SkuCategory'

    ComponentSku:
      type: object
      properties:
        skuId:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        name:
          type: string
        specText:
          type: string
        beadDiameterMm:
          type: number
          format: double
        price:
          type: number
          format: double
        stockQty:
          type: integer
        salesStatus:
          type: string
          enum: [ON_SALE, OFF_SALE, OUT_OF_STOCK]
        imageUrl:
          type: string

    PageMeta:
      type: object
      properties:
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
          format: int64

    ApiResponseComponentSkuPage:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
