openapi: 3.0.3
info:
  title: ChuanYi Backend API (Draft V1)
  version: 1.0.0-draft
  description: |
    Draft API contract for ChuanYi app.
    Scope includes DIY flow, order flow, and added goods/cart flow.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
  - name: Component
  - name: Design
  - name: Snapshot
  - name: Address
  - name: Order
  - name: Payment
  - name: Content
  - name: Logistics
  - name: Goods
  - name: Cart
  - name: Admin
security:
  - bearerAuth: []
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login or guest login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginData'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMeData'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'

  /api/sku/categories:
    get:
      tags: [Component]
      summary: Get component categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSkuCategoryList'

  /api/sku/list:
    get:
      tags: [Component]
      summary: Get component SKU list
      parameters:
        - in: query
          name: categoryId
          schema:
            type: integer
            format: int64
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseComponentSkuPage'

  /api/design/draft/save:
    post:
      tags: [Design]
      summary: Save design draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignDraftSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDesignDraftSaveData'

  /api/design/draft/list:
    get:
      tags: [Design]
      summary: List design drafts
      parameters:
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDesignDraftPage'

  /api/design/draft/{id}:
    get:
      tags: [Design]
      summary: Get draft detail
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDesignDraftDetail'
    delete:
      tags: [Design]
      summary: Delete draft
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'

  /api/design/snapshot/create-from-draft:
    post:
      tags: [Snapshot]
      summary: Create snapshot from draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotCreateRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSnapshotCreateData'

  /api/design/snapshot/{snapshotNo}:
    get:
      tags: [Snapshot]
      summary: Get snapshot detail
      parameters:
        - in: path
          name: snapshotNo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSnapshotDetail'

  /api/address/list:
    get:
      tags: [Address]
      summary: Get address list
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAddressList'

  /api/address/save:
    post:
      tags: [Address]
      summary: Create or update address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressSaveRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAddressSaveData'

  /api/address/{id}:
    delete:
      tags: [Address]
      summary: Delete address
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'

  /api/order/create:
    post:
      tags: [Order]
      summary: Create order from DIY snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderCreateData'

  /api/order/create-from-cart:
    post:
      tags: [Order]
      summary: Create order from cart items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateFromCartRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderCreateData'

  /api/order/create-direct-goods:
    post:
      tags: [Order]
      summary: Create order directly from goods sku
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateDirectGoodsRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderCreateData'

  /api/payment/mock/pay:
    post:
      tags: [Payment]
      summary: Mock payment submit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockPayRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMockPayData'

  /api/payment/mock/callback:
    post:
      tags: [Payment]
      summary: Mock payment callback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockPayCallbackRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'

  /api/order/list:
    get:
      tags: [Order]
      summary: Get order list
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderPage'

  /api/order/{orderNo}:
    get:
      tags: [Order]
      summary: Get order detail
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderDetail'

  /api/order/{orderNo}/cancel:
    post:
      tags: [Order]
      summary: Cancel order
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderActionData'

  /api/order/{orderNo}/ship:
    post:
      tags: [Order]
      summary: Ship order
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderShipRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderShipData'

  /api/order/{orderNo}/confirm-receipt:
    post:
      tags: [Order]
      summary: Confirm receipt
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOrderActionData'

  /api/content/banner/list:
    get:
      tags: [Content]
      summary: Get banner list
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBannerList'

  /api/gallery/list:
    get:
      tags: [Content]
      summary: Get design gallery list
      parameters:
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGalleryPage'

  /api/gallery/{id}:
    get:
      tags: [Content]
      summary: Get design gallery detail
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGalleryDetail'

  /api/logistics/track:
    get:
      tags: [Logistics]
      summary: Get logistics track
      parameters:
        - in: query
          name: carrierCode
          required: true
          schema:
            type: string
        - in: query
          name: trackingNo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLogisticsTrack'

  /api/goods/categories:
    get:
      tags: [Goods]
      summary: Get goods categories
      parameters:
        - in: query
          name: withCount
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGoodsCategoryList'

  /api/goods/list:
    get:
      tags: [Goods]
      summary: Get goods SPU list
      parameters:
        - in: query
          name: categoryId
          schema:
            type: integer
            format: int64
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: sortType
          schema:
            type: string
            enum: [DEFAULT, PRICE_ASC, PRICE_DESC, NEWEST]
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGoodsSpuPage'

  /api/goods/{spuId}:
    get:
      tags: [Goods]
      summary: Get goods detail
      parameters:
        - in: path
          name: spuId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGoodsDetail'

  /api/cart:
    get:
      tags: [Cart]
      summary: Get cart detail
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartData'

  /api/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartAddRequest'
      responses:
        '200':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartSummary'

  /api/cart/items/{cartItemId}:
    put:
      tags: [Cart]
      summary: Update cart item qty
      parameters:
        - in: path
          name: cartItemId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartUpdateQtyRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartSummary'
    delete:
      tags: [Cart]
      summary: Delete cart item
      parameters:
        - in: path
          name: cartItemId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartSummary'

  /api/cart/items/{cartItemId}/select:
    put:
      tags: [Cart]
      summary: Select or unselect one cart item
      parameters:
        - in: path
          name: cartItemId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartSelectRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartSummary'

  /api/cart/items/select-all:
    post:
      tags: [Cart]
      summary: Select or unselect all cart items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartSelectAllRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCartSummary'

  /api/cart/settlement/preview:
    post:
      tags: [Cart]
      summary: Preview settlement and validation result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementPreviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSettlementPreviewData'

  /api/admin/auth/login:
    post:
      tags: [Admin]
      summary: Admin login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/auth/me:
    get:
      tags: [Admin]
      summary: Get current admin profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/auth/logout:
    post:
      tags: [Admin]
      summary: Admin logout
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/dashboard/overview:
    get:
      tags: [Admin]
      summary: Admin dashboard overview metrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/order/list:
    get:
      tags: [Admin]
      summary: List orders for admin
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/order/{orderNo}:
    get:
      tags: [Admin]
      summary: Get admin order detail
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/order/{orderNo}/cancel:
    post:
      tags: [Admin]
      summary: Cancel order by admin
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remark:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/order/{orderNo}/ship:
    post:
      tags: [Admin]
      summary: Ship order by admin
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                carrierCode:
                  type: string
                trackingNo:
                  type: string
                remark:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/order/{orderNo}/complete:
    post:
      tags: [Admin]
      summary: Mark order completed by admin
      parameters:
        - in: path
          name: orderNo
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remark:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/list:
    get:
      tags: [Admin]
      summary: List goods for admin
      parameters:
        - in: query
          name: categoryId
          schema:
            type: integer
            format: int64
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: salesStatus
          schema:
            type: string
        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/{spuId}:
    get:
      tags: [Admin]
      summary: Get goods detail for admin edit
      parameters:
        - in: path
          name: spuId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/{spuId}/status:
    post:
      tags: [Admin]
      summary: Update goods sales status
      parameters:
        - in: path
          name: spuId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [salesStatus]
              properties:
                salesStatus:
                  type: string
                  enum: [ON_SALE, OFF_SALE]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/{spuId}/save:
    post:
      tags: [Admin]
      summary: Save goods basic fields
      parameters:
        - in: path
          name: spuId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                subtitle:
                  type: string
                categoryId:
                  type: integer
                  format: int64
                coverImageUrl:
                  type: string
                sortNo:
                  type: integer
                minPrice:
                  type: number
                maxPrice:
                  type: number
                stockStatus:
                  type: string
                salesStatus:
                  type: string
                tags:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/{spuId}/sku/create:
    post:
      tags: [Admin]
      summary: Create SKU under goods SPU
      parameters:
        - in: path
          name: spuId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [specText, price]
              properties:
                specText:
                  type: string
                skuImageUrl:
                  type: string
                price:
                  type: number
                originPrice:
                  type: number
                stockQty:
                  type: integer
                salesStatus:
                  type: string
                  enum: [ON_SALE, OFF_SALE]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/sku/{skuId}/save:
    post:
      tags: [Admin]
      summary: Save SKU fields
      parameters:
        - in: path
          name: skuId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specText:
                  type: string
                skuImageUrl:
                  type: string
                price:
                  type: number
                originPrice:
                  type: number
                stockQty:
                  type: integer
                salesStatus:
                  type: string
                  enum: [ON_SALE, OFF_SALE]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /api/admin/goods/sku/{skuId}/status:
    post:
      tags: [Admin]
      summary: Update SKU sales status
      parameters:
        - in: path
          name: skuId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [salesStatus]
              properties:
                salesStatus:
                  type: string
                  enum: [ON_SALE, OFF_SALE]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

